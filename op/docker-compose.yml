# 운영 호스트(192.168.110.225) 전용 compose.
# Layout B (artifact 방식, 사내 컨벤션):
#   /home/prompt-studio/op/
#   ├── docker-compose.yml            ← 이 파일
#   ├── wc-prompt-studio-<sha>.tar.gz ← docker save 산출물 (220.223 에서 생성)
#   ├── .env                          ← 운영 시크릿 + IMAGE_TAG
#   └── logs/                         ← 컨테이너 로그 마운트
#
# 빌드는 운영서버가 아닌 곳(예: 개발 220.223)에서 수행.
# 운영서버는 docker load → docker-compose up 만 실행.
#
# 운영 호스트는 root only — 이미지 안의 nextjs(uid 1001) 그대로 사용.
# 호스트 logs/ 는 1001:1001 로 chown 해둬야 컨테이너가 씀.
#
# compose v1 호환 (운영: docker-compose 1.24.1 → 최대 3.7 인식).
version: "3.7"

services:
  wc-prompt-studio:
    # IMAGE_TAG 는 .env 에서 주입 (예: IMAGE_TAG=abc1234, git short sha).
    # 미설정 시 latest 로 fallback.
    image: wc-prompt-studio:${IMAGE_TAG:-latest}
    container_name: wc-prompt-studio
    user: "1001:1001"
    ports:
      - "7999:3000"
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - PORT=3000
      - HOSTNAME=0.0.0.0
    volumes:
      - ./logs:/app/logs
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "7"
    restart: unless-stopped
    networks:
      wc-prompt-studio-network:
        ipv4_address: 172.24.18.2

networks:
  wc-prompt-studio-network:
    driver: bridge
    ipam:
      driver: default
      config:
        # diva-rag-manager 가 172.24.17.0/24 점유 — 형제 서브넷 사용.
        - subnet: 172.24.18.0/24
