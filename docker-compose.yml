services:
  wc-prompt-studio:
    build:
      context: .
      dockerfile: docker/Dockerfile
      args:
        # 리버스 프록시(dev-backdoor.ploonet.com/prompt-studio/) 아래에서
        # 서빙되므로 Next.js 와 fetch 헬퍼 양쪽에 같은 prefix 를 빌드 시점에
        # 인라인. 직접 IP(7999) 로 접속할 일이 더 이상 없다면 그대로 두고,
        # localhost 단독 배포가 필요해지면 값만 비우면 됨.
        NEXT_PUBLIC_BASE_PATH: /prompt-studio
    container_name: wc-prompt-studio
    # Run as the host's seri user so the mounted ./logs volume is
    # writable without chown. Adjust if the host user differs.
    user: "1007:1012"
    ports:
      # Host 7999 → container 3000. 3000 on this host is taken by
      # diva-rag-manager.
      - "7999:3000"
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - PORT=3000
      - HOSTNAME=0.0.0.0
    volumes:
      # Server file logger writes here. Host path is gitignored.
      - ./logs:/app/logs
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "7"
    restart: unless-stopped
    networks:
      wc-prompt-studio-network:
        ipv4_address: 172.24.18.2

networks:
  wc-prompt-studio-network:
    driver: bridge
    ipam:
      driver: default
      config:
        # diva-rag-manager occupies 172.24.17.0/24; use a sibling subnet.
        - subnet: 172.24.18.0/24
